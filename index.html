<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SubTracker - 訂閱制與固定支出管家</title>
  
  <!-- PWA & iOS Specific Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SubTracker">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="icon.svg">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">
      <img src="icon.svg" alt="Logo">
      <h1>SubTracker 管家</h1>
    </div>
    <button class="pwa-btn" id="install-btn">安裝 App</button>
  </header>

  <main>
    <!-- Summary Dashboard Card -->
    <div class="summary-card">
      <div class="summary-header">
        <span class="summary-title">本月預估扣款總額</span>
        <select id="global-currency" class="currency-select">
          <option value="NT$">NT$ (TWD)</option>
          <option value="$">$ (USD)</option>
          <option value="¥">¥ (JPY)</option>
          <option value="€">€ (EUR)</option>
        </select>
      </div>
      <div class="total-amount" id="monthly-total">NT$ 0</div>
      <div class="summary-stats-grid">
        <div class="stat-box">
          <span class="stat-label">年度預估支出</span>
          <span class="stat-value" id="yearly-total">NT$ 0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">生效中訂閱數</span>
          <span class="stat-value" id="active-count">0 項</span>
        </div>
      </div>
    </div>

    <!-- Quick Add Presets Bar -->
    <div class="section-header">
      <span class="section-title">快速新增熱門訂閱</span>
    </div>
    <div class="presets-scroll">
      <div class="preset-chip" data-name="Netflix" data-price="390" data-icon="🎬" data-category="娛樂">
        <span class="preset-icon">🎬</span> Netflix
      </div>
      <div class="preset-chip" data-name="Spotify" data-price="149" data-icon="🎵" data-category="娛樂">
        <span class="preset-icon">🎵</span> Spotify
      </div>
      <div class="preset-chip" data-name="ChatGPT Plus" data-price="650" data-icon="🤖" data-category="AI/工具">
        <span class="preset-icon">🤖</span> ChatGPT Plus
      </div>
      <div class="preset-chip" data-name="iCloud+ (200GB)" data-price="90" data-icon="☁️" data-category="雲端">
        <span class="preset-icon">☁️</span> iCloud+
      </div>
      <div class="preset-chip" data-name="YouTube Premium" data-price="199" data-icon="▶️" data-category="娛樂">
        <span class="preset-icon">▶️</span> YouTube
      </div>
      <div class="preset-chip" data-name="GitHub Copilot" data-price="320" data-icon="💻" data-category="開發">
        <span class="preset-icon">💻</span> Copilot
      </div>
    </div>

    <!-- Subscriptions List Section -->
    <div class="section-header">
      <span class="section-title">我的訂閱清單</span>
      <button class="btn-add-primary" id="btn-open-add">+ 新增訂閱</button>
    </div>

    <div class="sub-list" id="sub-list-container">
      <!-- Dynamic list rendered by JS -->
    </div>

    <!-- Backup & Data Tools -->
    <div class="tools-bar">
      <button class="btn-tool" id="btn-export">📤 匯出資料 JSON</button>
      <button class="btn-tool" id="btn-import">📥 匯入資料 JSON</button>
      <input type="file" id="import-file-input" accept=".json" style="display: none;">
    </div>
  </main>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="sub-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-heading">新增訂閱服務</h2>
        <button class="btn-close-modal" id="btn-close-modal">✕</button>
      </div>

      <form id="sub-form">
        <input type="hidden" id="sub-id">

        <div class="form-group">
          <label class="form-label">服務名稱</label>
          <input type="text" id="sub-name" placeholder="例：Netflix" required>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">扣款金額</label>
            <input type="number" id="sub-price" placeholder="390" step="any" required>
          </div>
          <div class="form-group">
            <label class="form-label">扣款週期</label>
            <select id="sub-cycle">
              <option value="monthly">每月 (Monthly)</option>
              <option value="yearly">每年 (Yearly)</option>
              <option value="weekly">每週 (Weekly)</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">下次扣款日期</label>
            <input type="date" id="sub-next-date" required>
          </div>
          <div class="form-group">
            <label class="form-label">類別標籤</label>
            <select id="sub-category">
              <option value="娛樂">🎬 娛樂與串流</option>
              <option value="AI/工具">🤖 AI 與生產力工具</option>
              <option value="雲端">☁️ 雲端儲存與網路</option>
              <option value="開發">💻 軟體開發</option>
              <option value="工作">💼 工作與商務</option>
              <option value="生活">🏠 生活與固定開銷</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">圖示/Emoji</label>
            <input type="text" id="sub-icon" placeholder="例：🎬" value="💳">
          </div>
          <div class="form-group">
            <label class="form-label">付款方式 (選填)</label>
            <input type="text" id="sub-payment" placeholder="例：玉山信用卡">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">備註資訊 (選填)</label>
          <input type="text" id="sub-notes" placeholder="例：與家庭成員共享">
        </div>

        <button type="submit" class="btn-submit" id="btn-submit-text">儲存訂閱項目</button>
        <button type="button" class="btn-delete-sub" id="btn-delete-sub" style="display: none;">🗑️ 刪除此訂閱</button>
      </form>
    </div>
  </div>

  <!-- iOS PWA Manual Guide Modal -->
  <div class="ios-guide-modal" id="pwa-modal">
    <div class="ios-guide-content">
      <button class="btn-close-modal" id="modal-close" style="align-self: flex-end;">✕</button>
      <h2 style="font-size: 1.2rem;">安裝至 iPhone 主畫面</h2>
      <p style="color: var(--text-dim); font-size: 0.85rem;">在 Safari 中安裝以獲得全螢幕原生體驗：</p>
      <div class="modal-steps">
        <div class="modal-step">
          <div class="step-num">1</div>
          <div>點擊底部工具列的 <strong>分享圖示</strong> (⎙)</div>
        </div>
        <div class="modal-step">
          <div class="step-num">2</div>
          <div>在選項中選擇 <strong>「加入主畫面」</strong></div>
        </div>
        <div class="modal-step">
          <div class="step-num">3</div>
          <div>點擊右上角的 <strong>「新增」</strong> 即可！</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
