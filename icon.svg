<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E2DE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A00E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#grad)"/>
  <!-- Credit Card / Calendar motif -->
  <rect x="96" y="140" width="320" height="200" rx="24" fill="none" stroke="#ffffff" stroke-width="14" opacity="0.9"/>
  <line x1="96" y1="196" x2="416" y2="196" stroke="#ffffff" stroke-width="14" opacity="0.9"/>
  <!-- Recurring Arrow Circle -->
  <circle cx="360" cy="340" r="70" fill="#8E2DE2" stroke="#ffffff" stroke-width="10"/>
  <path d="M340 320 A 30 30 0 1 1 330 350" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <polygon points="340,305 355,320 330,328" fill="#ffffff"/>
  <!-- Dollar symbol inside card -->
  <text x="140" y="290" font-family="-apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" opacity="0.8">$</text>
</svg>
